<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel">
        <header class="panel-header">
          <div>
            <p class="eyebrow">Classic arcade</p>
            <h1>Snake</h1>
          </div>
          <div class="status-group">
            <div class="status-card">
              <span class="status-label">Score</span>
              <strong id="score">0</strong>
            </div>
            <div class="status-card">
              <span class="status-label">State</span>
              <strong id="game-state">Ready</strong>
            </div>
          </div>
        </header>

        <div class="game-frame">
          <div
            id="board"
            class="board"
            role="grid"
            aria-label="Snake board"
          ></div>
        </div>

        <div class="toolbar">
          <button id="start-button" type="button">Start</button>
          <button id="pause-button" type="button">Pause</button>
          <button id="restart-button" type="button">Restart</button>
        </div>

        <div class="controls">
          <button class="control-button" data-direction="up" type="button" aria-label="Move up">↑</button>
          <div class="controls-middle">
            <button class="control-button" data-direction="left" type="button" aria-label="Move left">←</button>
            <button class="control-button" data-direction="down" type="button" aria-label="Move down">↓</button>
            <button class="control-button" data-direction="right" type="button" aria-label="Move right">→</button>
          </div>
        </div>

        <p class="help-text">
          Use arrow keys or WASD to move. Press space to pause or resume.
        </p>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
